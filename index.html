<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Libros | CRUD App</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Gestor de Libros</h1>
        </header>

        <main>
            <section class="glass-panel form-section">
                <h2 id="form-title">Añadir Nuevo Libro</h2>
                <form id="book-form">
                    <input type="hidden" id="book-id">

                    <div class="form-group">
                        <label for="title">Título</label>
                        <input type="text" id="title" required placeholder="Ej. El Señor de los Anillos">
                    </div>

                    <div class="form-group">
                        <label for="author">Autor</label>
                        <input type="text" id="author" required placeholder="Ej. J.R.R. Tolkien">
                    </div>

                    <div class="form-group row">
                        <div class="col">
                            <label for="year">Año</label>
                            <input type="number" id="year" required placeholder="Ej. 1954">
                        </div>
                        <div class="col">
                            <label for="genre">Género</label>
                            <select id="genre" required>
                                <option value="" disabled selected>Selecciona un género</option>
                                <option value="Ficción">Ficción</option>
                                <option value="Fantasía">Fantasía</option>
                                <option value="Ciencia Ficción">Ciencia Ficción</option>
                                <option value="Misterio">Misterio</option>
                                <option value="Biografía">Biografía</option>
                                <option value="Historia">Historia</option>
                                <option value="Desarrollo Personal">Desarrollo Personal</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="isbn">ISBN</label>
                        <input type="text" id="isbn" required placeholder="Ej. 978-0261102385">
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn primary-btn">
                            <i class="fas fa-plus"></i> Guardar
                        </button>
                        <button type="button" id="cancel-btn" class="btn secondary-btn hidden">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>
                </form>
            </section>

            <section class="glass-panel list-section">
                <h2>Lista de Libros</h2>

                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar por título, autor, género...">
                </div>

                <div class="table-container">
                    <table id="books-table">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Año</th>
                                <th>Género</th>
                                <th>ISBN</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="books-list">
                            <!-- Los libros se renderizarán aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state hidden">
                    <i class="fas fa-book-open"></i>
                    <p>No hay libros registrados aún.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
